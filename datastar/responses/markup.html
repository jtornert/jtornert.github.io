<span id="response-html">I was loaded by Datastar 🚀</span>

<div id="overlay">
    <dialog
        data-init="el.showModal(); $activeElement = document.activeElement; root.inert = true; el.querySelector('button')?.focus()"
        class="alert"
    >
        <h2>Alert</h2>
        <form method="dialog">
            <button
                class="button"
                data-on:click="root.inert = null; $activeElement?.focus(); $activeElement = null; requestAnimationFrame(()=>{el.closest('dialog').remove()})"
                style="padding-inline: 0"
            >
                <ui-icon icon="cross"></ui-icon>
            </button>
        </form>
        <div>
            <p>This message is from Datastar.</p>
            <p>
                You can send multiple fragments to different areas of your DOM.
            </p>
        </div>
    </dialog>
</div>
